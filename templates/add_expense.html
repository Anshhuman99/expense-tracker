{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/add_expense.css') }}">
{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Add New Expense</h1>
            <p class="auth-subtitle">Record your transaction to keep your budget on track</p>
        </div>

        <div class="auth-card">
            <form method="POST" action="{{ url_for('add_expense') }}">
                <div class="form-group">
                    <label for="amount">Amount (₹) <span class="required-asterisk">*</span></label>
                    <input type="number" id="amount" name="amount" step="0.01" min="0.01"
                           class="form-input" placeholder="0.00" value="{{ amount }}" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="category">Category <span class="required-asterisk">*</span></label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="" disabled {% if not category %}selected{% endif %}>Select category</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}" {% if category == cat %}selected{% endif %}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date <span class="required-asterisk">*</span></label>
                    <input type="date" id="date" name="date" class="form-input" value="{{ date }}" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" class="form-input" placeholder="e.g. Weekly groceries" value="{{ description }}">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Add Expense</button>
                    <a href="{{ url_for('profile') }}" class="btn-ghost">Cancel</a>
                </div>
            </form>
        </div>

    </div>
</section>
{% endblock %}
